name: PR

on:
  pull_request:

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  validate-powershell-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate PowerShell script syntax
        shell: pwsh
        run: ./scripts/Verify-PowerShellSyntax.ps1

  build:
    needs: [validate-powershell-scripts]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build
        uses: ./.github/actions/build
        with:
          validate-native-aot: 'true'
          aot-runtime-identifier: linux-x64

  publish-aot:
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rid: win-x64
          - runner: ubuntu-22.04
            rid: linux-x64
          - runner: ubuntu-22.04
            rid: linux-arm64
          - runner: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install linux-arm64 prerequisites
        if: matrix.rid == 'linux-arm64'
        shell: bash
        run: |
          set -euo pipefail
          sudo dpkg --add-architecture arm64
          sudo bash -c 'cat > /etc/apt/sources.list.d/arm64.list <<EOF
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy main restricted universe
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy-updates main restricted universe
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy-security main restricted universe
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ jammy-backports main restricted universe multiverse
          EOF'
          sudo sed -i -e 's/^deb /deb [arch=amd64] /g' /etc/apt/sources.list
          sudo apt update
          sudo apt install -y clang llvm binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu zlib1g-dev:arm64

      - name: Build and validate NativeAOT publish
        uses: ./.github/actions/build
        with:
          validate-native-aot: 'true'
          aot-runtime-identifier: ${{ matrix.rid }}
